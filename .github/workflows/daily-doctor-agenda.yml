name: Daily doctor agenda backup

on:
  schedule:
    # 08:10 America/Argentina/Buenos_Aires. Vercel remains the primary cron.
    - cron: '10 11 * * *'
  workflow_dispatch:

jobs:
  trigger-daily-agenda:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily agenda endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="https://am-clinica-main.vercel.app/api/agenda/daily-summary"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl --fail --show-error --silent \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "${URL}"
          else
            curl --fail --show-error --silent "${URL}"
          fi
